<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="../icons/PCMT Logo.png">
    <title>PCMT - Teams</title>
</head>
<body>
    <div id="header-bar">
        <div class="header-inner">
        <div class="header-content" id="link-title">
            <a href="../"><img src="../icons/PCMT Logo.png" alt="PCMT Logo" id="pcmt-logo"></a>
            <p>Plat Chat Members Tournament</p>
        </div>
        <nav class="header-content">
            <a class="header-link" href="../">Home</a>
            <a class="header-link" href="../matches/">Matches</a>
            <a class="header-link" href="../standings/">Standings</a>
            <a class="header-link active" href="../teams/">Teams</a>
            <a class="header-link" href="../stats/">Stats</a>
            <div class="header-buffer"></div>
        </nav>
        </div>
    </div>

    <div class="page-container">
    <div class="page-title-bar"><h1 class="page-title">Teams</h1></div>
    <div id="teams-container"></div>

    <script>
        let events = [];
        const teamData = {};

        async function init() {
            try { events = await (await fetch('../data/events/events.json')).json(); } catch(e) { events = []; }
            buildSections();
            await loadAllRosters();
        }

        function buildSections() {
            const container = document.getElementById('teams-container');
            const seasons = {};
            events.forEach(e => { if (!seasons[e.season]) seasons[e.season] = []; seasons[e.season].push(e); });
            const sorted = Object.keys(seasons).map(Number).sort((a, b) => a - b);

            sorted.forEach(sNum => {
                const sEvents = seasons[sNum];
                const ongoing = sEvents.some(e => e.status === 'ongoing');
                const tag = ongoing ? ' <span class="ongoing-tag">(Ongoing)</span>' : '';
                const id = `season${sNum}`;

                let inner = '';
                sEvents.forEach(ev => {
                    if (sEvents.length > 1) inner += `<h3 class="region-grid-header">${ev.shortName}</h3>`;
                    inner += `<div class="teams-grid" id="grid-${ev.id}"></div>`;
                });

                container.innerHTML += `
                    <div class="season-container">
                        <button class="season-toggle" onclick="toggleSeason('${id}')">
                            <span class="season-label">Season ${sNum}${tag}</span>
                            <span class="toggle-icon" id="${id}-icon">\u25b8</span>
                        </button>
                        <div class="season-content" id="${id}">${inner}</div>
                    </div>`;
            });
        }

        async function loadAllRosters() {
            for (const ev of events) {
                try {
                    const data = await (await fetch(`../data/events/${ev.path}/teams.json`)).json();
                    teamData[ev.id] = data;
                    const grid = document.getElementById(`grid-${ev.id}`);
                    if (!grid) continue;
                    const cards = Object.entries(data).map(([abbr, t]) => ({
                        abbr, name: t.name,
                        logo: t.logo ? ('../' + t.logo.replace(/^(\.\.\/)+/, '')) : '',
                    }));
                    cards.sort((a, b) => a.name.localeCompare(b.name));
                    cards.forEach(card => {
                        const div = document.createElement('div');
                        div.className = 'team-card';
                        div.dataset.abbr = card.abbr;
                        div.innerHTML = `<img src="${card.logo}" alt="${card.name}" class="team-logo"><h3 class="team-name">${card.name}</h3>`;
                        div.onclick = () => toggleExpand(div, card, ev);
                        grid.appendChild(div);
                    });
                } catch(e) {}
            }
        }

        function toggleExpand(cardEl, card, ev) {
            const grid = cardEl.parentElement;
            const existing = grid.querySelector(`.team-expand[data-abbr="${card.abbr}"]`);
            if (existing && existing.classList.contains('open')) {
                existing.classList.remove('open'); cardEl.classList.remove('expanded');
                setTimeout(() => existing.remove(), 10); return;
            }
            const openPanel = grid.querySelector('.team-expand.open');
            if (openPanel) { openPanel.classList.remove('open'); const oc = grid.querySelector('.team-card.expanded'); if (oc) oc.classList.remove('expanded'); openPanel.remove(); }

            const cardRect = cardEl.getBoundingClientRect();
            let lastInRow = cardEl;
            for (const c of grid.querySelectorAll('.team-card')) {
                if (Math.abs(c.getBoundingClientRect().top - cardRect.top) < 10) lastInRow = c;
            }

            const data = teamData[ev.id];
            const roster = data && data[card.abbr] ? data[card.abbr].players : null;
            const sorted = roster ? [...roster].sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase())) : [];

            const panel = document.createElement('div');
            panel.className = 'team-expand'; panel.dataset.abbr = card.abbr;
            panel.innerHTML = `
                <div class="team-expand-header">
                    <img src="${card.logo}" class="team-expand-logo" onerror="this.style.display='none'">
                    <div>
                        <div class="team-expand-name">${card.name}</div>
                        <div class="team-expand-abbr">${card.abbr} \u00b7 ${ev.shortName || 'S' + ev.season}</div>
                    </div>
                </div>
                <div class="team-expand-roster">
                    ${sorted.length ? sorted.map(p => `<span class="team-expand-player">${p}</span>`).join('') : '<span style="color:#777">Roster not available</span>'}
                </div>
                <a href="team/?team=${card.abbr}&event=${ev.id}" class="team-expand-link">View full page \u2192</a>
            `;
            lastInRow.after(panel);
            requestAnimationFrame(() => panel.classList.add('open'));
            cardEl.classList.add('expanded');
        }

        function toggleSeason(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById(id + '-icon');
            content.classList.toggle('open');
            icon.textContent = content.classList.contains('open') ? '\u25be' : '\u25b8';
        }

        window.addEventListener('pageshow', () => {
            document.querySelectorAll('.season-content').forEach(el => el.classList.remove('open'));
            document.querySelectorAll('.toggle-icon').forEach(el => el.textContent = '\u25b8');
        });

        init();
    </script>
    </div>
</body>
</html>
