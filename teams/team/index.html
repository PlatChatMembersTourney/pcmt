<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <link rel="icon" href="../../icons/PCMT Logo.png">
    <title>PCMT - Team</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div id="header-bar">
        <div class="header-inner">
        <div class="header-content" id="link-title">
            <a href="../../"><img src="../../icons/PCMT Logo.png" alt="PCMT Logo" id="pcmt-logo"></a>
            <p>Plat Chat Members Tournament</p>
        </div>
        <nav class="header-content">
            <a class="header-link" href="../../">Home</a>
            <a class="header-link" href="../../matches/">Matches</a>
            <a class="header-link" href="../../standings/">Standings</a>
            <a class="header-link active" href="../../teams/">Teams</a>
            <a class="header-link" href="../../stats/">Stats</a>
            <div class="header-buffer"></div>
        </nav>
        </div>
    </div>

    <div class="page-container">
    <div id="team-detail"><div class="stats-loading">Loading team...</div></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const teamAbbr = params.get('team');
        const eventId = params.get('event') || 's2-na';
        let eventConfig = {};
        let eventInfo = null;
        let eventPath = '';
        let currentTeam = null;
        let allTeams = {};
        const cache = {};

        function oppLogoFor(abbr) {
            if (!abbr || !allTeams[abbr]) return '';
            const logo = allTeams[abbr].logo.replace(/^(\.\.\/)+/, '');
            return `<img src="../../${logo}" alt="${abbr}" class="td-opp-logo" onerror="this.style.display='none'">`;
        }

        async function init() {
            // Load events.json to get path for this event
            try {
                const res = await fetch('../../data/events/events.json');
                const events = await res.json();
                const ev = events.find(e => e.id === eventId);
                eventInfo = ev || null;
                eventPath = ev ? ev.path : eventId.replace('-', '/');
            } catch(e) { eventPath = eventId.replace('-', '/'); }

            // Load event config
            try { eventConfig = await (await fetch(`../../data/events/${eventPath}/event.json`)).json(); }
            catch(e) { eventConfig = {}; }

            loadTeam();
        }

        function dataPath() { return `../../data/events/${eventPath}/`; }

        async function loadTeam() {
            const container = document.getElementById('team-detail');
            if (!teamAbbr) { container.innerHTML = '<p class="stats-error">No team specified.</p>'; return; }

            try {
                const res = await fetch(dataPath() + 'teams.json');
                const teams = await res.json();
                allTeams = teams;
                const team = teams[teamAbbr];
                if (!team) { container.innerHTML = `<p class="stats-error">Team "${teamAbbr}" not found.</p>`; return; }

                currentTeam = team;
                document.title = `PCMT - ${team.name}`;
                const sortedPlayers = [...team.players].sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
                const seasonLabel = eventInfo ? eventInfo.name : (eventConfig.shortName || eventConfig.name || eventId);

                let html = '';
                html += '<div class="td-header">';
                html += `<img src="${team.logo}" alt="${team.name}" class="td-logo" onerror="this.style.display='none'">`;
                html += '<div class="td-header-text">';
                html += `<h1 class="td-name">${team.name}</h1>`;
                html += `<span class="td-meta">${team.abbr} \u00b7 ${seasonLabel}</span>`;
                html += '</div></div>';

                html += '<div class="td-section"><h2 class="td-subtitle">Roster</h2><div class="td-roster">';
                sortedPlayers.forEach(p => { html += `<div class="td-roster-player">${p}</div>`; });
                html += '</div></div>';

                html += '<div class="td-columns"><div class="td-col-left">';
                html += '<h2 class="td-subtitle">Player Stats</h2><div class="td-stats-box">';

                const fmt = eventConfig.statsFormat || 'xlsx';
                if (fmt === 'xlsx') {
                    const ptabs = (eventConfig.statsTabs && eventConfig.statsTabs.player) || ['toxic'];
                    html += '<div class="stats-sub-tabs" id="td-stats-tabs">';
                    ptabs.forEach((t, i) => { html += `<button class="stats-sub-btn ${i === 0 ? 'active' : ''}" onclick="switchStatSource('${t}')">${t}</button>`; });
                    html += '</div>';
                }

                html += '<div id="td-stats-area"><div class="stats-loading">Loading stats...</div></div>';
                html += `<a href="../../stats/?event=${eventId}" class="td-see-all">See all stats \u2192</a>`;
                html += '</div></div>';

                html += '<div class="td-col-right"><h2 class="td-subtitle">Matches</h2><div class="td-matches-box">';
                html += '<div class="stats-sub-tabs" id="td-match-tabs">';
                html += '<button class="stats-sub-btn active" onclick="switchMatchTab(\'upcoming\')">Upcoming</button>';
                html += '<button class="stats-sub-btn" onclick="switchMatchTab(\'completed\')">Completed</button>';
                html += '</div>';
                html += '<div id="td-matches-area"><div class="stats-loading">Loading matches...</div></div>';
                html += '</div></div></div>';

                html += '<div class="td-section"><h2 class="td-subtitle">Map Stats</h2>';
                html += '<div id="td-map-area"><div class="stats-loading">Loading stats...</div></div></div>';

                container.innerHTML = html;

                if (fmt === 'json') {
                    loadJsonRatingStats(team);
                    loadJsonMapStats(team);
                } else {
                    const ptabs = (eventConfig.statsTabs && eventConfig.statsTabs.player) || ['toxic'];
                    loadRatingStats(team, ptabs[0]);
                    loadMapStats(team);
                }
                loadTeamMatches();
            } catch (err) {
                container.innerHTML = '<p class="stats-error">Failed to load team data.</p>';
            }
        }

        function switchStatSource(source) {
            const ptabs = (eventConfig.statsTabs && eventConfig.statsTabs.player) || ['toxic'];
            document.querySelectorAll('#td-stats-tabs .stats-sub-btn').forEach((btn, i) => btn.classList.toggle('active', ptabs[i] === source));
            if (currentTeam) loadRatingStats(currentTeam, source);
        }

        // ========== MATCHES ==========
        let matchData = null, currentMatchTab = 'upcoming';

        function switchMatchTab(tab) {
            currentMatchTab = tab;
            document.querySelectorAll('#td-match-tabs .stats-sub-btn').forEach((btn, i) => btn.classList.toggle('active', ['upcoming', 'completed'][i] === tab));
            renderTeamMatches();
        }

        async function loadTeamMatches() {
            try {
                const res = await fetch(dataPath() + 'matches/matches.json');
                if (!res.ok) { document.getElementById('td-matches-area').innerHTML = '<p class="td-no-matches">No upcoming matches</p>'; return; }
                matchData = await res.json();
                renderTeamMatches();
            } catch(e) { document.getElementById('td-matches-area').innerHTML = '<p class="td-no-matches">No upcoming matches</p>'; }
        }

        function renderTeamMatches() {
            const area = document.getElementById('td-matches-area');
            if (!matchData || !currentTeam) { area.innerHTML = '<p class="td-no-matches">No match data available</p>'; return; }
            const teamMatches = matchData.filter(m => m.team1 === currentTeam.abbr || m.team2 === currentTeam.abbr || m.team1Name === currentTeam.name || m.team2Name === currentTeam.name);
            const filtered = currentMatchTab === 'completed' ? teamMatches.filter(m => m.completed) : teamMatches.filter(m => !m.completed);
            if (!filtered.length) { area.innerHTML = `<p class="td-no-matches">No ${currentMatchTab} matches</p>`; return; }
            const sorted = [...filtered].sort((a, b) => currentMatchTab === 'completed' ? new Date(b.date||0) - new Date(a.date||0) : new Date(a.date||0) - new Date(b.date||0));

            let html = '';
            sorted.forEach(match => {
                const isTeam1 = match.team1 === currentTeam.abbr || match.team1Name === currentTeam.name;
                const oppAbbr = isTeam1 ? match.team2 : match.team1;
                const oppName = isTeam1 ? match.team2Name : match.team1Name;
                const myScore = isTeam1 ? match.score1 : match.score2;
                const oppScore = isTeam1 ? match.score2 : match.score1;
                const won = myScore > oppScore;

                html += `<a class="td-match-card" href="../../matches/match.html?id=${match.id}&event=${eventId}">`;
                html += `<div class="td-match-meta">${match.stage||''}${match.date?' \u00b7 '+match.date:''}</div>`;

                if (match.completed) {
                    html += '<div class="td-match-row">';
                    html += `<div class="td-match-team td-match-team-left ${won?'td-match-winner':''}"><span class="td-match-name">${currentTeam.name}</span><span class="td-match-abbr">${currentTeam.abbr}</span></div>`;
                    html += `<div class="td-match-center"><span class="td-score ${won?'td-score-win':'td-score-loss'}">${myScore}</span><span class="td-score-sep">:</span><span class="td-score ${!won?'td-score-win':'td-score-loss'}">${oppScore}</span></div>`;
                    html += `<div class="td-match-team td-match-team-right ${!won?'td-match-winner':''}">${oppLogoFor(oppAbbr)}<span class="td-match-abbr">${oppAbbr}</span><span class="td-match-name">${oppName}</span></div>`;
                    html += '</div>';
                    if (match.maps && match.maps.length) { html += '<div class="td-match-maps">'; match.maps.forEach(map => { const ms1=isTeam1?map.score1:map.score2,ms2=isTeam1?map.score2:map.score1,mw=ms1>ms2; html += `<div class="td-map-pill"><span class="td-map-pill-name">${map.name}</span><span class="${mw?'td-map-win':'td-map-loss'}">${ms1}</span><span class="td-map-sep">-</span><span class="${!mw?'td-map-win':'td-map-loss'}">${ms2}</span></div>`; }); html += '</div>'; }
                } else {
                    html += '<div class="td-match-row">';
                    html += `<div class="td-match-team td-match-team-left"><span class="td-match-name">${currentTeam.name}</span><span class="td-match-abbr">${currentTeam.abbr}</span></div>`;
                    html += '<div class="td-match-center"><span class="td-match-vs">vs</span></div>';
                    html += `<div class="td-match-team td-match-team-right">${oppLogoFor(oppAbbr)}<span class="td-match-abbr">${oppAbbr}</span><span class="td-match-name">${oppName}</span></div>`;
                    html += '</div>';
                }
                html += '</a>';
            });
            area.innerHTML = html;
        }

        // ========== STATS LOADING ==========
        function findCol(headers, names) { return headers.findIndex(h => { if (!h) return false; const l = h.trim().toLowerCase(); return names.some(n => l === n); }); }

        function filterTeamRows(rows, headers, team) {
            const tc = findCol(headers, ['team']);
            const ru = team.players.map(p => p.toUpperCase());
            if (tc !== -1) { const bt = rows.filter(r => { const v = String(r[tc]||'').trim().toUpperCase(); return v === team.abbr.toUpperCase() || v === team.name.toUpperCase(); }); if (bt.length) return bt; }
            for (let c = 0; c < headers.length; c++) { if (c === tc) continue; const bc = rows.filter(r => ru.includes(String(r[c]||'').trim().toUpperCase())); if (bc.length >= 2) return bc; }
            return [];
        }

        async function getDataset(source) {
            const key = `dataset-${source}-${eventId}`;
            if (cache[key]) return cache[key];
            let headers, rows;
            try {
                if (source === 'toxic') {
                    const ab = await (await fetch(dataPath() + 'Player Stats.xlsx')).arrayBuffer();
                    const wb = XLSX.read(ab, { type: 'array' });
                    const data = XLSX.utils.sheet_to_json(wb.Sheets['Overall'], { header: 1 });
                    headers = data[0]; rows = data.slice(1).filter(r => r[0]);
                } else if (source === 'Angus') {
                    const csv = await (await fetch('https://docs.google.com/spreadsheets/d/1NZNABsU_XUlmcSgjhv94KVvbRtpYji6yPjs0g2Ro3Ak/export?format=csv&gid=821526300')).text();
                    const lines = parseCSV(csv); headers = lines[0]; rows = lines.slice(1).filter(r => r[0] || r[1]);
                } else if (source === 'pi') {
                    const csv = await (await fetch('https://docs.google.com/spreadsheets/d/1QkBIqtPC5jP1b1rKkn39U7z5DJJ-6SYdbWcgA6Wz7AQ/export?format=csv&gid=1023990137')).text();
                    const lines = parseCSV(csv); headers = lines[1]; rows = lines.slice(2).filter(r => r[1] || r[2]);
                }
            } catch(e) { return { headers: [], rows: [] }; }
            cache[key] = { headers, rows }; return { headers, rows };
        }

        async function loadRatingStats(team, source) {
            const area = document.getElementById('td-stats-area');
            try {
                const { headers, rows } = await getDataset(source);
                if (!headers || !headers.length) { area.innerHTML = '<p class="stats-error">Data not found.</p>'; return; }
                const teamRows = filterTeamRows(rows, headers, team);
                if (!teamRows.length) { area.innerHTML = '<p class="stats-error">Data not found.</p>'; return; }
                const rc = findCol(headers, ['r1.0', 'r', 'rating', 'rrating']), pc = findCol(headers, ['player', 'name', 'ign']);
                if (rc === -1) { area.innerHTML = '<p class="stats-error">Data not found.</p>'; return; }
                const nc = pc !== -1 ? pc : 0;
                const sorted = [...teamRows].sort((a, b) => (parseFloat(b[rc]) || 0) - (parseFloat(a[rc]) || 0));
                let html = '<table class="stats-table td-rating-table"><thead><tr><th>Player</th><th>Rating</th></tr></thead><tbody>';
                sorted.forEach(row => { html += `<tr><td>${row[nc]||''}</td><td>${row[rc]!=null&&row[rc]!==''?parseFloat(row[rc]).toFixed(2):'-'}</td></tr>`; });
                html += '</tbody></table>'; area.innerHTML = html;
            } catch(e) { area.innerHTML = '<p class="stats-error">Failed to load stats.</p>'; }
        }

        // JSON stats for S3+
        async function loadJsonRatingStats(team) {
            const area = document.getElementById('td-stats-area');
            try {
                const data = await (await fetch(dataPath() + 'player-stats.json')).json();
                const overall = data['Overall'] || [];
                const teamRows = overall.filter(p => team.players.some(tp => tp.toLowerCase() === p.Player.toLowerCase()));
                if (!teamRows.length) { area.innerHTML = '<p class="stats-error">No stats yet.</p>'; return; }
                teamRows.sort((a, b) => b['R1.0'] - a['R1.0']);
                let html = '<table class="stats-table td-rating-table"><thead><tr><th>Player</th><th>Rating</th></tr></thead><tbody>';
                teamRows.forEach(p => { html += `<tr><td>${p.Player}</td><td>${p['R1.0'].toFixed(2)}</td></tr>`; });
                html += '</tbody></table>'; area.innerHTML = html;
            } catch(e) { area.innerHTML = '<p class="stats-error">Failed to load stats.</p>'; }
        }

        async function loadJsonMapStats(team) {
            const area = document.getElementById('td-map-area');
            try {
                const data = await (await fetch(dataPath() + 'team-map-stats.json')).json();
                const t = data[team.abbr]; if (!t) { area.innerHTML = '<p class="stats-error">No map stats yet.</p>'; return; }
                let html = `<div class="team-overall-bar"><div class="overall-stat"><span class="overall-label">Overall Atk%</span><span class="overall-value">${(t.overallAtkPct*100).toFixed(0)}%</span></div><div class="overall-stat"><span class="overall-label">Overall Def%</span><span class="overall-value">${(t.overallDefPct*100).toFixed(0)}%</span></div></div>`;
                const hd = ['Map','Pick','Ban','Played','Won','Win%','RND','RND Won','RND%','Atk%','Def%'];
                const rows = t.maps.map(m => [m.map,m.pick,m.ban,m.played,m.won,(m.winPct*100).toFixed(0)+'%',m.rounds,m.roundsWon,(m.roundPct*100).toFixed(0)+'%',(m.atkPct*100).toFixed(0)+'%',(m.defPct*100).toFixed(0)+'%']);
                html += renderTable(hd, rows, 'td-maps'); area.innerHTML = html; highlightTable('td-maps', 'team');
            } catch(e) { area.innerHTML = '<p class="stats-error">Failed to load map stats.</p>'; }
        }

        // Legacy xlsx map stats
        async function loadMapStats(team) {
            const area = document.getElementById('td-map-area');
            try {
                const mapCacheKey = `teammap-xlsx-${eventId}`;
                let ab;
                if (cache[mapCacheKey]) ab = cache[mapCacheKey];
                else { const r = await fetch(dataPath() + 'Team Map Stats.xlsx'); if (!r.ok) { area.innerHTML = '<p class="stats-error">Map stats not available.</p>'; return; } ab = await r.arrayBuffer(); cache[mapCacheKey] = ab; }
                const wb = XLSX.read(ab, { type: 'array' });
                const sheetName = wb.SheetNames.find(s => s === team.name || s.includes(team.abbr) || s.includes(team.name));
                if (!sheetName) { area.innerHTML = '<p class="stats-error">Data not found.</p>'; return; }
                const data = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { header: 1 });
                const hr = data[1] || []; const hasPick = hr.some(h => h && String(h).trim() === 'Pick');
                const lc=hasPick?10:9,rs=hasPick?11:10,re=hasPick?21:19,ovc=hasPick?2:1;
                const mh = hasPick ? ['Map','Pick','Ban','Played','Won','Win%','RND','RND Won','RND%','Atk%','Def%'] : ['Map','Ban','Played','Won','Win%','RND','RND Won','RND%','Atk%','Def%'];
                const mr = []; let oa = null, od = null;
                for (let i = 0; i < data.length; i++) { if (data[i][0] === 'Atk%') oa = data[i][ovc]; if (data[i][0] === 'Def%') od = data[i][ovc]; }
                for (let sr = 0; sr < data.length; sr += 4) { if (sr+2>=data.length) break; const nr=data[sr],dr=data[sr+2]; if (nr[0]==='Atk%'||nr[0]==='Def%') continue;
                if (nr[0]) { const d=dr.slice(0,lc); const rb=[nr[0]]; for (let i=0;i<d.length;i++){const h=mh[i+1];rb.push(h&&h.includes('%')?fmtPct(d[i]):fmtNum(d[i]))} mr.push(rb) }
                if (nr[rs]) { const d=dr.slice(rs,re); const rb=[nr[rs]]; for (let i=0;i<d.length;i++){const h=mh[i+1];rb.push(h&&h.includes('%')?fmtPct(d[i]):fmtNum(d[i]))} mr.push(rb) } }
                const fr = mr.filter(r => r.slice(1).some(c => c !== '-')).sort((a,b) => String(a[0]).localeCompare(String(b[0])));
                let html = '';
                if (oa != null || od != null) html += `<div class="team-overall-bar"><div class="overall-stat"><span class="overall-label">Overall Atk%</span><span class="overall-value">${fmtPct(oa)}</span></div><div class="overall-stat"><span class="overall-label">Overall Def%</span><span class="overall-value">${fmtPct(od)}</span></div></div>`;
                html += renderTable(mh, fr, 'td-maps'); area.innerHTML = html; highlightTable('td-maps', 'team');
            } catch(e) { area.innerHTML = '<p class="stats-error">Failed to load map stats.</p>'; }
        }

        function parseCSV(t) { return t.split('\n').map(l => { const c = []; let cur = '', q = false; for (let i = 0; i < l.length; i++) { const ch = l[i]; if (ch === '"') q = !q; else if (ch === ',' && !q) { c.push(cur.trim()); cur = ''; } else cur += ch; } c.push(cur.trim()); return c; }).filter(r => r.some(c => c !== '')); }

        // ========== TABLE RENDERING ==========
        const sortState = {};
        const lowerIsBetter = ['d','dpr','fdpr','fd','ban'];

        function renderTable(headers,rows,tableId){let h=`<table class="stats-table" id="table-${tableId}"><thead><tr>`;headers.forEach((hd,i)=>{h+=`<th class="sortable" onclick="sortTable('${tableId}',${i})">${hd} <span class="sort-arrow"></span></th>`});h+='</tr></thead><tbody>';rows.forEach(r=>{h+='<tr>';r.forEach(c=>h+=`<td>${c??''}</td>`);h+='</tr>'});h+='</tbody></table>';sortState[tableId]={headers,rows:[...rows],originalRows:[...rows],currentCol:-1,clicks:0,highlightMode:null};return h}

        function sortTable(tableId,colIndex){const state=sortState[tableId];if(!state)return;if(state.currentCol===colIndex)state.clicks++;else{state.currentCol=colIndex;state.clicks=1}let sorted;if(state.clicks%3===0){sorted=[...state.originalRows];state.currentCol=-1;state.clicks=0}else{const asc=state.clicks%3===2;sorted=[...state.rows].sort((a,b)=>{let va=a[colIndex],vb=b[colIndex];if(typeof va==='string'&&va.endsWith('%'))va=parseFloat(va);if(typeof vb==='string'&&vb.endsWith('%'))vb=parseFloat(vb);const na=parseFloat(va),nb=parseFloat(vb);if(!isNaN(na)&&!isNaN(nb))return asc?na-nb:nb-na;return asc?String(va||'').localeCompare(String(vb||'')):String(vb||'').localeCompare(String(va||''))})}const table=document.getElementById(`table-${tableId}`);table.querySelector('tbody').innerHTML=sorted.map(r=>'<tr>'+r.map(c=>`<td>${c??''}</td>`).join('')+'</tr>').join('');const ths=table.querySelectorAll('thead th');ths.forEach((th,i)=>{const a=th.querySelector('.sort-arrow');if(i===colIndex&&state.currentCol!==-1)a.textContent=state.clicks%3===1?' \u25bc':' \u25b2';else a.textContent=''});if(state.highlightMode)highlightTable(tableId,state.highlightMode)}

        function highlightTable(tableId,mode){const table=document.getElementById(`table-${tableId}`);if(!table)return;const state=sortState[tableId];if(!state)return;state.highlightMode=mode;const headers=state.headers;const trs=table.querySelector('tbody').querySelectorAll('tr');if(trs.length<2)return;const skip=new Set();headers.forEach((h,i)=>{const l=(h||'').trim().toLowerCase();if(['#','player','team','map','mp'].includes(l))skip.add(i)});for(let col=0;col<headers.length;col++){if(skip.has(col))continue;const inv=lowerIsBetter.includes((headers[col]||'').trim().toLowerCase());let bv=null,wv=null,bi=-1,wi=-1;trs.forEach((tr,ri)=>{const td=tr.children[col];if(!td)return;let raw=td.textContent.trim();if(raw===''||raw==='-')return;if(raw.endsWith('%'))raw=raw.slice(0,-1);const n=parseFloat(raw);if(isNaN(n))return;if(bv===null){bv=n;wv=n;bi=ri;wi=ri}else{if(inv){if(n<bv){bv=n;bi=ri}if(n>wv){wv=n;wi=ri}}else{if(n>bv){bv=n;bi=ri}if(n<wv){wv=n;wi=ri}}}});if(bi!==-1&&bv!==wv){const td=trs[bi].children[col];if(td)td.classList.add('stat-best')}if(mode==='team'&&wi!==-1&&bv!==wv){const td=trs[wi].children[col];if(td)td.classList.add('stat-worst')}}}

        function fmtPct(v){if(v==null||v==='')return'-';if(typeof v==='number')return(v*100).toFixed(0)+'%';return v}
        function fmtNum(v){if(v==null||v==='')return'-';return v}

        init();
    </script>
    </div>
</body>
</html>
