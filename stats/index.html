<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="../icons/PCMT Logo.png">
    <title>PCMT - Stats</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div id="header-bar">
        <div class="header-inner">
        <div class="header-content" id="link-title">
            <a href="../"><img src="../icons/PCMT Logo.png" alt="PCMT Logo" id="pcmt-logo"></a>
            <p>Plat Chat Members Tournament</p>
        </div>
        <nav class="header-content">
            <a class="header-link" href="../">Home</a>
            <a class="header-link" href="../matches/">Matches</a>
            <a class="header-link" href="../standings/">Standings</a>
            <a class="header-link" href="../teams/">Teams</a>
            <a class="header-link active" href="../stats/">Stats</a>
            <div class="header-buffer"></div>
        </nav>
        </div>
    </div>

    <div class="page-container">
    <div class="page-title-bar"><h1 class="page-title">Stats</h1></div>

    <div class="season-selector-bar" id="season-selector"></div>
    <div class="stats-sub-tabs" id="region-selector" style="display:none;"></div>

    <div class="stats-toggle-bar">
        <button class="stats-toggle-btn active" onclick="switchMainTab('player')">Player Stats</button>
        <button class="stats-toggle-btn" onclick="switchMainTab('team')">Team Stats</button>
    </div>

    <div class="stats-content" id="player-stats">
        <div class="stats-sub-tabs" id="player-sub-tabs"></div>
        <div class="stats-sub-tabs" id="player-stage-tabs" style="display:none;"></div>
        <div id="player-table-area"><div class="stats-table-container"><div class="stats-loading">Loading stats...</div></div></div>
    </div>
    <div class="stats-content hidden" id="team-stats">
        <div class="stats-sub-tabs" id="team-sub-tabs"></div>
        <div id="team-table-area"><div class="stats-table-container"><div class="stats-loading">Loading stats...</div></div></div>
    </div>

    <script>
        let events=[],currentEvent=null,currentSeason=2,eventConfig={};
        let currentMainTab='player',currentPlayerTab=null,currentStage='Overall';
        let currentToxicStage='Overall',currentAngusStage='Group Stage';
        const seasons={},sortState={},teamsLookup={},toxicTeamWB={};
        let jsonPlayerData=null,jsonTeamData=null;

        const angusSheets={'Group Stage':{sheetId:'1NZNABsU_XUlmcSgjhv94KVvbRtpYji6yPjs0g2Ro3Ak',gid:'821526300'},'Playoffs':{sheetId:'1ea1gKWPE1kBkK9d0O6Mky0r5iBkBX9qkTA3OBS0LKMY',gid:'821526300'}};
        const toxicStages=['Overall','Group Stage','Playoffs'];
        const angusStages=['Group Stage','Playoffs'];

        function getEvent(id){return events.find(e=>e.id===id)}
        function dataPath(){const ev=getEvent(currentEvent);return ev?`../data/events/${ev.path}/`:'../data/events/s2/na/';}
        function cacheGet(k){try{return sessionStorage.getItem('pcmt-stats-'+k)}catch(e){return null}}
        function cacheSet(k,v){try{sessionStorage.setItem('pcmt-stats-'+k,v)}catch(e){}}
        function cacheGetJSON(k){const r=cacheGet(k);if(!r)return null;try{return JSON.parse(r)}catch(e){return null}}
        function cacheSetJSON(k,v){try{cacheSet(k,JSON.stringify(v))}catch(e){}}

        async function init(){
            try{events=await(await fetch('../data/events/events.json')).json()}catch(e){events=[]}
            events.forEach(e=>{if(!seasons[e.season])seasons[e.season]=[];seasons[e.season].push(e)});
            const fromUrl=new URLSearchParams(window.location.search).get('event');
            if(fromUrl&&events.some(e=>e.id===fromUrl)){currentEvent=fromUrl;currentSeason=getEvent(fromUrl).season}
            else{const o=events.find(e=>e.status==='ongoing');if(o){currentEvent=o.id;currentSeason=o.season}else if(events.length){currentEvent=events[0].id;currentSeason=events[0].season}}
            renderSelectors();await loadEventConfig();await loadTeamsLookup();buildTabs();
        }

        function renderSelectors(){
            const sNums=Object.keys(seasons).map(Number).sort((a,b)=>a-b);
            document.getElementById('season-selector').innerHTML=sNums.map(s=>`<button class="season-sel-btn ${s===currentSeason?'active':''}" onclick="switchSeason(${s})">Season ${s}</button>`).join('');
            const bar=document.getElementById('region-selector'),sEvents=seasons[currentSeason]||[];
            if(sEvents.length>1){bar.style.display='';bar.innerHTML=sEvents.map(e=>`<button class="stats-sub-btn ${e.id===currentEvent?'active':''}" onclick="switchRegion('${e.id}')">${e.shortName}</button>`).join('')}
            else{bar.style.display='none';if(sEvents.length===1)currentEvent=sEvents[0].id}
        }

        async function switchSeason(s){currentSeason=s;const sE=seasons[s]||[];currentEvent=sE[0]?sE[0].id:currentEvent;setUrl();renderSelectors();await loadEventConfig();await loadTeamsLookup();buildTabs()}
        async function switchRegion(id){currentEvent=id;currentSeason=getEvent(id).season;setUrl();renderSelectors();await loadEventConfig();await loadTeamsLookup();buildTabs()}
        function setUrl(){const u=new URL(window.location);u.searchParams.set('event',currentEvent);history.replaceState(null,'',u)}

        async function loadEventConfig(){try{eventConfig=await(await fetch(dataPath()+'event.json')).json()}catch(e){eventConfig={}}}
        async function loadTeamsLookup(){if(teamsLookup[currentEvent])return;try{const d=await(await fetch(dataPath()+'teams.json')).json();teamsLookup[currentEvent]={};for(const[a,t]of Object.entries(d)){teamsLookup[currentEvent][a.toUpperCase()]=a;teamsLookup[currentEvent][t.name.toUpperCase()]=a}}catch(e){teamsLookup[currentEvent]={}}}
        function teamLink(v){if(!v)return v;const l=teamsLookup[currentEvent];if(!l)return v;const a=l[String(v).trim().toUpperCase()];if(!a)return v;return`<a href="../teams/team/?team=${a}&event=${currentEvent}" class="team-link">${v}</a>`}

        function switchMainTab(tab){currentMainTab=tab;document.getElementById('player-stats').classList.toggle('hidden',tab!=='player');document.getElementById('team-stats').classList.toggle('hidden',tab!=='team');document.querySelectorAll('.stats-toggle-btn').forEach((b,i)=>b.classList.toggle('active',(tab==='player'?0:1)===i))}

        function buildTabs(){
            const fmt=eventConfig.statsFormat||'xlsx';
            currentToxicStage='Overall';currentAngusStage='Group Stage';
            const pBar=document.getElementById('player-sub-tabs'),tBar=document.getElementById('team-sub-tabs'),sBar=document.getElementById('player-stage-tabs');
            sBar.style.display='none';jsonPlayerData=null;jsonTeamData=null;

            const hasTabs=eventConfig.statsTabs&&eventConfig.statsTabs.player;

            if(fmt==='json'&&!hasTabs){
                pBar.innerHTML='';tBar.innerHTML='';
                loadJsonPlayerStats();loadJsonTeamStats();
            } else {
                const pt=hasTabs?eventConfig.statsTabs.player:['toxic'];
                const tt=(eventConfig.statsTabs&&eventConfig.statsTabs.team)||['toxic'];
                pBar.innerHTML=pt.map((n,i)=>`<button class="stats-sub-btn ${i===0?'active':''}" onclick="switchPlayerTab('${n}')">${n}</button>`).join('');
                tBar.innerHTML=tt.map((n,i)=>`<button class="stats-sub-btn ${i===0?'active':''}" onclick="switchTeamTab('${n}')">${n}</button>`).join('');
                currentPlayerTab=pt[0];loadPlayerTabAny(pt[0]);loadTeamTabAny(tt[0]);
            }
        }

        function loadPlayerTabAny(name){
            const fmt=eventConfig.statsFormat||'xlsx';
            const sheets=eventConfig.sheetStats||{};
            if(fmt==='json'&&name==='toxic'){loadJsonPlayerStats();document.getElementById('player-stage-tabs').style.display='none';return}
            if(sheets[name]){loadSheetPlayerStats(name);return}
            loadLegacyPlayerTab(name);
        }

        function loadTeamTabAny(name){
            const fmt=eventConfig.statsFormat||'xlsx';
            if(fmt==='json'&&name==='toxic'){loadJsonTeamStats();return}
            loadLegacyTeamTab(name);
        }

        async function loadSheetPlayerStats(name){
            const cfg=(eventConfig.sheetStats||{})[name];
            if(!cfg){return}
            const ck=`${currentEvent}-psheet-${name}`;const area=document.getElementById('player-table-area');
            const sBar=document.getElementById('player-stage-tabs');sBar.style.display='none';
            const tid=`sheet-p-${currentEvent}-${name}`;
            const cached=cacheGetJSON(ck);
            if(cached){const{headers:h,rows:r}=cached;area.innerHTML=`<div class="stats-table-container">${renderTable(h,r,tid)}</div>`;sortByRating(tid,h);highlightTable(tid,'player');return}
            area.innerHTML='<div class="stats-table-container"><div class="stats-loading">Loading stats...</div></div>';
            try{
                const csv=await(await fetch(`https://docs.google.com/spreadsheets/d/${cfg.sheetId}/export?format=csv&gid=${cfg.gid}`)).text();
                const lines=parseCSV(csv);let headers=lines[0];let rows=lines.slice(1).filter(r=>r[0]||r[1]);
                const rc=[];headers.forEach((h,i)=>{const l=h.toLowerCase().trim();if(l==='points'||l==='agents'||l==='+/-')rc.push(i)});
                rc.sort((a,b)=>b-a).forEach(i=>{headers.splice(i,1);rows.forEach(r=>r.splice(i,1))});
                rows=rows.filter(r=>{const f=String(r[0]||'').trim().toUpperCase();return f!=='MEDIAN'&&f!=='MEAN'});
                const merged=mergeTeamIntoPlayer(headers,rows);cacheSetJSON(ck,{headers:merged.headers,rows:merged.rows});
                area.innerHTML=`<div class="stats-table-container">${renderTable(merged.headers,merged.rows,tid)}</div>`;sortByRating(tid,merged.headers);highlightTable(tid,'player');
            }catch(e){area.innerHTML='<div class="stats-table-container"><p class="stats-error">Failed to load stats.</p></div>'}
        }

        // ═══ JSON Stats (S3+) ════════════════════════════════════════════
        async function loadJsonPlayerStats(){
            const area=document.getElementById('player-table-area');
            const ck=`${currentEvent}-pjson`;const cached=cacheGetJSON(ck);
            if(cached){jsonPlayerData=cached;renderJsonPlayerStage('Overall');return}
            area.innerHTML='<div class="stats-table-container"><div class="stats-loading">Loading stats...</div></div>';
            try{jsonPlayerData=await(await fetch(dataPath()+'player-stats.json')).json();cacheSetJSON(ck,jsonPlayerData);renderJsonPlayerStage('Overall')}
            catch(e){area.innerHTML='<div class="stats-table-container"><p class="stats-error">Failed to load player stats.</p></div>'}
        }

        function renderJsonPlayerStage(stage){
            currentStage=stage;const area=document.getElementById('player-table-area');
            if(!jsonPlayerData){area.innerHTML='<div class="stats-table-container"><p class="stats-error">No data.</p></div>';return}
            const sBar=document.getElementById('player-stage-tabs'),stages=Object.keys(jsonPlayerData);
            if(stages.length>1){sBar.style.display='';sBar.innerHTML=stages.map(s=>`<button class="stats-sub-btn ${s===stage?'active':''}" onclick="renderJsonPlayerStage('${s}')">${s}</button>`).join('')}else sBar.style.display='none';
            const rows=jsonPlayerData[stage];
            if(!rows||!rows.length){area.innerHTML='<div class="stats-table-container"><p class="stats-error">No data for this stage.</p></div>';return}
            const headers=['Player','Team','MP','Rounds','R1.0','ACS','K','D','A','+/-','KPR','DPR','KAST','ADR','HS%','FK','FD','FKPR','FDPR','FK+/-','KMAX'];
            const tRows=rows.map(p=>[p.Player,p.Team,p.MP,p.Rounds,typeof p['R1.0']==='number'?p['R1.0'].toFixed(2):p['R1.0'],p.ACS,p.K,p.D,p.A,p.PlusMinus,typeof p.KPR==='number'?p.KPR.toFixed(2):p.KPR,typeof p.DPR==='number'?p.DPR.toFixed(2):p.DPR,(p.KAST*100).toFixed(0)+'%',typeof p.ADR==='number'?p.ADR.toFixed(1):p.ADR,(p['HS%']*100).toFixed(0)+'%',p.FK,p.FD,typeof p.FKPR==='number'?p.FKPR.toFixed(2):p.FKPR,typeof p.FDPR==='number'?p.FDPR.toFixed(2):p.FDPR,p.PlusMinus2,p.KMAX]);
            const tid=`jpla-${currentEvent}-${stage}`;const merged=mergeTeamIntoPlayer(headers,tRows);
            area.innerHTML=`<div class="stats-table-container">${renderTable(merged.headers,merged.rows,tid)}</div>`;sortByRating(tid,merged.headers);highlightTable(tid,'player');
        }

        async function loadJsonTeamStats(){
            const area=document.getElementById('team-table-area');
            const ck=`${currentEvent}-tjson`;const cached=cacheGetJSON(ck);
            if(cached){jsonTeamData=cached;renderJsonTeamPicker();return}
            area.innerHTML='<div class="stats-table-container"><div class="stats-loading">Loading stats...</div></div>';
            try{jsonTeamData=await(await fetch(dataPath()+'team-map-stats.json')).json();cacheSetJSON(ck,jsonTeamData);renderJsonTeamPicker()}
            catch(e){area.innerHTML='<div class="stats-table-container"><p class="stats-error">Failed to load team stats.</p></div>'}
        }

        function renderJsonTeamPicker(){
            const area=document.getElementById('team-table-area');if(!jsonTeamData)return;
            const keys=Object.keys(jsonTeamData).sort();
            let h='<div class="stats-table-container"><div class="stats-sub-tabs">';
            keys.forEach((k,i)=>{const t=jsonTeamData[k];h+=`<button class="stats-sub-btn ${i===0?'active':''}" onclick="renderJsonTeamMap('${k}',this)">${t.teamName||k}</button>`});
            h+='</div><div id="json-team-area"></div></div>';area.innerHTML=h;
            if(keys.length)renderJsonTeamMap(keys[0]);
        }

        function renderJsonTeamMap(k,btn){
            if(btn){btn.parentElement.querySelectorAll('.stats-sub-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
            const t=jsonTeamData[k];if(!t)return;const c=document.getElementById('json-team-area');
            let h=`<div class="team-overall-bar"><div class="overall-stat"><span class="overall-label">Overall Atk%</span><span class="overall-value">${(t.overallAtkPct*100).toFixed(0)}%</span></div><div class="overall-stat"><span class="overall-label">Overall Def%</span><span class="overall-value">${(t.overallDefPct*100).toFixed(0)}%</span></div></div>`;
            const hd=['Map','Pick','Ban','Played','Won','Win%','RND','RND Won','RND%','Atk%','Def%'];
            const rows=t.maps.map(m=>[m.map,m.pick,m.ban,m.played,m.won,(m.winPct*100).toFixed(0)+'%',m.rounds,m.roundsWon,(m.roundPct*100).toFixed(0)+'%',(m.atkPct*100).toFixed(0)+'%',(m.defPct*100).toFixed(0)+'%']);
            const tid=`jtm-${currentEvent}-${k}`;h+=renderTable(hd,rows,tid);c.innerHTML=h;highlightTable(tid,'team');
        }

        // ═══ Legacy XLSX/Sheets (S1/S2) ══════════════════════════════════
        function switchPlayerTab(name){
            currentPlayerTab=name;const pt=(eventConfig.statsTabs&&eventConfig.statsTabs.player)||['toxic'];
            document.querySelectorAll('#player-sub-tabs .stats-sub-btn').forEach((b,i)=>b.classList.toggle('active',pt[i]===name));
            loadPlayerTabAny(name);
        }
        function switchTeamTab(name){
            const tt=(eventConfig.statsTabs&&eventConfig.statsTabs.team)||['toxic'];
            document.querySelectorAll('#team-sub-tabs .stats-sub-btn').forEach((b,i)=>b.classList.toggle('active',tt[i]===name));
            loadTeamTabAny(name);
        }

        function loadLegacyPlayerTab(name){
            const sBar=document.getElementById('player-stage-tabs');
            if(name==='toxic'){sBar.style.display='';sBar.innerHTML=toxicStages.map(s=>`<button class="stats-sub-btn ${s===currentToxicStage?'active':''}" onclick="switchToxicStage('${s}')">${s}</button>`).join('');loadToxicPlayer(currentToxicStage)}
            else if(name==='Angus'){sBar.style.display='';sBar.innerHTML=angusStages.map(s=>`<button class="stats-sub-btn ${s===currentAngusStage?'active':''}" onclick="switchAngusStage('${s}')">${s}</button>`).join('');loadAngusStats(currentAngusStage)}
            else if(name==='pi'){sBar.style.display='none';loadPiPlayer()}
            else sBar.style.display='none';
        }
        function switchToxicStage(s){currentToxicStage=s;document.querySelectorAll('#player-stage-tabs .stats-sub-btn').forEach((b,i)=>b.classList.toggle('active',toxicStages[i]===s));loadToxicPlayer(s)}
        function switchAngusStage(s){currentAngusStage=s;document.querySelectorAll('#player-stage-tabs .stats-sub-btn').forEach((b,i)=>b.classList.toggle('active',angusStages[i]===s));loadAngusStats(s)}
        function loadLegacyTeamTab(name){if(name==='toxic')loadToxicTeam();else if(name==='pi')loadPiTeam()}

        async function loadToxicPlayer(sheet){
            sheet=sheet||'Overall';const ck=`${currentEvent}-ptox-${sheet}`;const area=document.getElementById('player-table-area');
            const cached=cacheGetJSON(ck);if(cached){const{headers:h,rows:r}=cached;const tid=`tp-${currentEvent}-${sheet}`;area.innerHTML=`<div class="stats-table-container">${renderTable(h,r,tid)}</div>`;sortByRating(tid,h);highlightTable(tid,'player');return}
            area.innerHTML='<div class="stats-table-container"><div class="stats-loading">Loading stats...</div></div>';
            try{const ab=await(await fetch(dataPath()+'Player Stats.xlsx')).arrayBuffer();const wb=XLSX.read(ab,{type:'array'});const sh=wb.Sheets[sheet];if(!sh){area.innerHTML='<div class="stats-table-container"><p class="stats-error">Sheet not found.</p></div>';return}
            const sd=XLSX.utils.sheet_to_json(sh,{header:1});const rh=sd[0];const pr=sd.slice(1).filter(r=>r[0]);if(!pr.length){area.innerHTML='<div class="stats-table-container"><p class="stats-error">No data.</p></div>';return}
            const rm=new Set();rh.forEach((h,i)=>{if(h==null||h===''||h==='Change')rm.add(i)});let headers=rh.filter((_,i)=>!rm.has(i));
            const rows=pr.map(r=>{let f=r.filter((_,i)=>!rm.has(i));while(f.length>headers.length)f.pop();return f.map((c,i)=>formatCell(c,headers[i]))});
            const tid=`tp-${currentEvent}-${sheet}`;const merged=mergeTeamIntoPlayer(headers,rows);cacheSetJSON(ck,{headers:merged.headers,rows:merged.rows});
            area.innerHTML=`<div class="stats-table-container">${renderTable(merged.headers,merged.rows,tid)}</div>`;sortByRating(tid,merged.headers);highlightTable(tid,'player')}
            catch(e){area.innerHTML='<div class="stats-table-container"><p class="stats-error">Failed to load player stats.</p></div>'}
        }

        async function loadAngusStats(stage){
            stage=stage||'Group Stage';const ck=`${currentEvent}-pangus-${stage}`;const area=document.getElementById('player-table-area');const tid=`ap-${currentEvent}-${stage.replace(/\s+/g,'')}`;
            const cached=cacheGetJSON(ck);if(cached){const{headers:h,rows:r}=cached;area.innerHTML=`<div class="stats-table-container">${renderTable(h,r,tid)}</div>`;sortByRating(tid,h);highlightTable(tid,'player');return}
            try{const cfg=angusSheets[stage];if(!cfg){area.innerHTML='<div class="stats-table-container"><p class="stats-error">Unknown stage.</p></div>';return}
            const csv=await(await fetch(`https://docs.google.com/spreadsheets/d/${cfg.sheetId}/export?format=csv&gid=${cfg.gid}`)).text();
            const lines=parseCSV(csv);let headers=lines[0];let rows=lines.slice(1).filter(r=>r[0]||r[1]);
            const rc=[];headers.forEach((h,i)=>{const l=h.toLowerCase().trim();if(l==='points'||l==='agents'||l==='+/-')rc.push(i)});rc.sort((a,b)=>b-a).forEach(i=>{headers.splice(i,1);rows.forEach(r=>r.splice(i,1))});
            rows=rows.filter(r=>{const f=String(r[0]||'').trim().toUpperCase();return f!=='MEDIAN'&&f!=='MEAN'});
            const merged=mergeTeamIntoPlayer(headers,rows);cacheSetJSON(ck,{headers:merged.headers,rows:merged.rows});
            area.innerHTML=`<div class="stats-table-container">${renderTable(merged.headers,merged.rows,tid)}</div>`;sortByRating(tid,merged.headers);highlightTable(tid,'player')}
            catch(e){area.innerHTML='<div class="stats-table-container"><p class="stats-error">Failed to load Angus\' stats.</p></div>'}
        }

        async function loadPiPlayer(){
            const ck=`${currentEvent}-ppi`;const area=document.getElementById('player-table-area');
            const cached=cacheGetJSON(ck);if(cached){const{headers:h,rows:r}=cached;area.innerHTML=`<div class="stats-table-container">${renderTable(h,r,'pip')}</div>`;sortByRating('pip',h);highlightTable('pip','player');return}
            try{const csv=await(await fetch('https://docs.google.com/spreadsheets/d/1QkBIqtPC5jP1b1rKkn39U7z5DJJ-6SYdbWcgA6Wz7AQ/export?format=csv&gid=1023990137')).text();
            const lines=parseCSV(csv);const ah=lines[1];const dr=lines.slice(2).filter(r=>r[0]||r[1]);
            const acsIdx=ah.findIndex(h=>h.trim().toUpperCase()==='ACS');const rIdx=ah.findIndex(h=>h.trim().toUpperCase()==='R');
            const ic=[1,2,3];if(rIdx!==-1&&rIdx<acsIdx)ic.push(rIdx);const ac=[];for(let i=acsIdx;i<ah.length;i++)ac.push(i);const kc=[...ic,...ac];
            const headers=kc.map(i=>ah[i]);const rows=dr.map(r=>kc.map(i=>r[i]??''));
            const merged=mergeTeamIntoPlayer(headers,rows);cacheSetJSON(ck,{headers:merged.headers,rows:merged.rows});
            area.innerHTML=`<div class="stats-table-container">${renderTable(merged.headers,merged.rows,'pip')}</div>`;sortByRating('pip',merged.headers);highlightTable('pip','player')}
            catch(e){area.innerHTML='<div class="stats-table-container"><p class="stats-error">Failed to load pi\'s stats.</p></div>'}
        }

        async function loadToxicTeam(){
            const area=document.getElementById('team-table-area');const ck=`${currentEvent}-ttox`;const cached=cacheGetJSON(ck);
            try{let sdm,tn;
            if(cached){sdm=cached.sheets;tn=cached.teamNames}
            else{const ab=await(await fetch(dataPath()+'Team Map Stats.xlsx')).arrayBuffer();const wb=XLSX.read(ab,{type:'array'});tn=wb.SheetNames.filter(s=>!s.includes('Comps')&&!s.includes('Data')).sort();sdm={};for(const n of tn)sdm[n]=XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1});cacheSetJSON(ck,{teamNames:tn,sheets:sdm})}
            toxicTeamWB[currentEvent]=sdm;
            let html='<div class="stats-table-container"><div class="stats-sub-tabs">';tn.forEach((t,i)=>{html+=`<button class="stats-sub-btn ${i===0?'active':''}" onclick="switchTeamMap('${t.replace(/'/g,"\\'")}',this)">${t}</button>`});
            html+='</div><div id="toxic-team-area"></div></div>';area.innerHTML=html;renderToxicTeamMap(tn[0])}
            catch(e){area.innerHTML='<div class="stats-table-container"><p class="stats-error">Failed to load team stats.</p></div>'}
        }

        function switchTeamMap(name,btn){btn.parentElement.querySelectorAll('.stats-sub-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderToxicTeamMap(name)}

        function renderToxicTeamMap(name){
            const sdm=toxicTeamWB[currentEvent];if(!sdm)return;const data=sdm[name];if(!data)return;
            const hr=data[1]||[];const hasPick=hr.some(h=>h&&String(h).trim()==='Pick');
            const lc=hasPick?10:9,rs=hasPick?11:10,re=hasPick?21:19,ovc=hasPick?2:1;
            const mh=hasPick?['Map','Pick','Ban','Played','Won','Win%','RND','RND Won','RND%','Atk%','Def%']:['Map','Ban','Played','Won','Win%','RND','RND Won','RND%','Atk%','Def%'];
            const mr=[];let oa=null,od=null;
            for(let i=0;i<data.length;i++){if(data[i][0]==='Atk%')oa=data[i][ovc];if(data[i][0]==='Def%')od=data[i][ovc]}
            for(let sr=0;sr<data.length;sr+=4){if(sr+2>=data.length)break;const nr=data[sr],dr=data[sr+2];if(nr[0]==='Atk%'||nr[0]==='Def%')continue;
            if(nr[0]){const d=dr.slice(0,lc);const rb=[nr[0]];for(let i=0;i<d.length;i++){const h=mh[i+1];rb.push(h&&h.includes('%')?fmtPct(d[i]):fmtNum(d[i]))}mr.push(rb)}
            if(nr[rs]){const d=dr.slice(rs,re);const rb=[nr[rs]];for(let i=0;i<d.length;i++){const h=mh[i+1];rb.push(h&&h.includes('%')?fmtPct(d[i]):fmtNum(d[i]))}mr.push(rb)}}
            const fr=mr.filter(r=>r.slice(1).some(c=>c!=='-')).sort((a,b)=>String(a[0]).localeCompare(String(b[0])));
            const c=document.getElementById('toxic-team-area');let html='';
            if(oa!=null||od!=null)html+=`<div class="team-overall-bar"><div class="overall-stat"><span class="overall-label">Overall Atk%</span><span class="overall-value">${fmtPct(oa)}</span></div><div class="overall-stat"><span class="overall-label">Overall Def%</span><span class="overall-value">${fmtPct(od)}</span></div></div>`;
            const tid=`ttm-${currentEvent}`;html+=renderTable(mh,fr,tid);c.innerHTML=html;highlightTable(tid,'team');
        }

        async function loadPiTeam(){
            const ck=`${currentEvent}-tpi`;const area=document.getElementById('team-table-area');
            const cached=cacheGetJSON(ck);if(cached){const{headers:h,rows:r,html}=cached;const tid='pit';area.innerHTML=`<div class="stats-table-container">${html}</div>`;sortState[tid]={headers:h,rows:[...r],originalRows:[...r],currentCol:-1,clicks:0,highlightMode:null};highlightTable(tid,'team');return}
            try{const csv=await(await fetch('https://docs.google.com/spreadsheets/d/1QkBIqtPC5jP1b1rKkn39U7z5DJJ-6SYdbWcgA6Wz7AQ/export?format=csv&gid=1030932262')).text();
            const lines=parseCSV(csv);const cr=lines[0],headers=lines[1],rows=lines.slice(2).filter(r=>r[0]||r[1]);
            const cs=[];for(let i=0;i<cr.length;i++){if(cr[i]&&cr[i].trim()!==''){let sp=1;for(let j=i+1;j<cr.length;j++){if(cr[j]&&cr[j].trim()!=='')break;sp++}cs.push({text:cr[i].trim(),start:i,span:sp})}}
            const tid='pit';let html=`<div class="stats-table-scroll"><table class="stats-table stats-table-sticky" id="table-${tid}"><thead><tr class="category-row">`;
            let cc=0;cs.forEach(c=>{if(c.start>cc)html+=`<th colspan="${c.start-cc}"></th>`;html+=`<th colspan="${c.span}" class="category-header">${c.text}</th>`;cc=c.start+c.span});
            if(cc<headers.length)html+=`<th colspan="${headers.length-cc}"></th>`;html+='</tr><tr>';
            headers.forEach((h,i)=>{html+=`<th class="sortable" onclick="sortTable('${tid}',${i})">${h} <span class="sort-arrow"></span></th>`});html+='</tr></thead><tbody>';
            const tci=headers.findIndex(h=>h&&h.trim().toLowerCase()==='team');
            rows.forEach(r=>{html+='<tr>';r.forEach((c,i)=>{html+=i===tci?`<td>${teamLink(c)}</td>`:`<td>${c??''}</td>`});html+='</tr>'});html+='</tbody></table></div>';
            sortState[tid]={headers,rows:[...rows],originalRows:[...rows],currentCol:-1,clicks:0,highlightMode:null};
            cacheSetJSON(ck,{headers,rows,html});area.innerHTML=`<div class="stats-table-container">${html}</div>`;highlightTable(tid,'team')}
            catch(e){area.innerHTML='<div class="stats-table-container"><p class="stats-error">Failed to load pi\'s team stats.</p></div>'}
        }

        // ═══ Shared table utils ══════════════════════════════════════════
        function renderTable(headers,rows,tableId){let h=`<table class="stats-table" id="table-${tableId}"><thead><tr>`;headers.forEach((hd,i)=>{h+=`<th class="sortable" onclick="sortTable('${tableId}',${i})">${hd} <span class="sort-arrow"></span></th>`});h+='</tr></thead><tbody>';rows.forEach(r=>{h+='<tr>';r.forEach(c=>h+=`<td>${c??''}</td>`);h+='</tr>'});h+='</tbody></table>';sortState[tableId]={headers,rows:[...rows],originalRows:[...rows],currentCol:-1,clicks:0,highlightMode:null};return h}
        function mergeTeamIntoPlayer(headers,rows){const ti=headers.findIndex(h=>h&&h.trim().toLowerCase()==='team');const pi=headers.findIndex(h=>h&&h.trim().toLowerCase()==='player');if(ti===-1||pi===-1)return{headers,rows};const nr=rows.map(r=>{const n=[...r];n[pi]=`${n[pi]||''}<span class="player-team-tag">${n[ti]||''}</span>`;return n});return{headers:headers.filter((_,i)=>i!==ti),rows:nr.map(r=>r.filter((_,i)=>i!==ti))}}
        function sortTable(tableId,colIndex){const state=sortState[tableId];if(!state)return;if(state.currentCol===colIndex)state.clicks++;else{state.currentCol=colIndex;state.clicks=1}let sorted;if(state.clicks%3===0){sorted=[...state.originalRows];state.currentCol=-1;state.clicks=0}else{const asc=state.clicks%3===2;sorted=[...state.rows].sort((a,b)=>{let va=a[colIndex],vb=b[colIndex];if(typeof va==='string'&&va.endsWith('%'))va=parseFloat(va);if(typeof vb==='string'&&vb.endsWith('%'))vb=parseFloat(vb);const na=parseFloat(va),nb=parseFloat(vb);if(!isNaN(na)&&!isNaN(nb))return asc?na-nb:nb-na;return asc?String(va||'').toLowerCase().localeCompare(String(vb||'').toLowerCase()):String(vb||'').toLowerCase().localeCompare(String(va||'').toLowerCase())})}const table=document.getElementById(`table-${tableId}`);table.querySelector('tbody').innerHTML=sorted.map(r=>'<tr>'+r.map(c=>`<td>${c??''}</td>`).join('')+'</tr>').join('');const ths=table.querySelectorAll('thead tr:last-child th');ths.forEach((th,i)=>{const a=th.querySelector('.sort-arrow');if(i===colIndex&&state.currentCol!==-1)a.textContent=state.clicks%3===1?' \u25bc':' \u25b2';else a.textContent=''});if(state.highlightMode)highlightTable(tableId,state.highlightMode)}
        function sortByRating(tid,headers){const idx=headers.findIndex(h=>['R1.0','R','Rating','rRating'].includes((h||'').trim()));if(idx!==-1)sortTable(tid,idx)}
        const lowerIsBetter=['d','dpr','fdpr','fd','ban'];
        function highlightTable(tableId,mode){const table=document.getElementById(`table-${tableId}`);if(!table)return;const state=sortState[tableId];if(!state)return;state.highlightMode=mode;const headers=state.headers;const trs=table.querySelector('tbody').querySelectorAll('tr');if(trs.length<2)return;const skip=new Set();headers.forEach((h,i)=>{const l=(h||'').trim().toLowerCase();if(['#','player','team','map','mp','rank'].includes(l))skip.add(i)});for(let col=0;col<headers.length;col++){if(skip.has(col))continue;const inv=lowerIsBetter.includes((headers[col]||'').trim().toLowerCase());let bv=null,wv=null,bi=-1,wi=-1;trs.forEach((tr,ri)=>{const td=tr.children[col];if(!td)return;let raw=td.textContent.trim();if(raw===''||raw==='-')return;if(raw.endsWith('%'))raw=raw.slice(0,-1);const n=parseFloat(raw);if(isNaN(n))return;if(bv===null){bv=n;wv=n;bi=ri;wi=ri}else{if(inv){if(n<bv){bv=n;bi=ri}if(n>wv){wv=n;wi=ri}}else{if(n>bv){bv=n;bi=ri}if(n<wv){wv=n;wi=ri}}}});if(bi!==-1&&bv!==wv){const td=trs[bi].children[col];if(td)td.classList.add('stat-best')}if(mode==='team'&&wi!==-1&&bv!==wv){const td=trs[wi].children[col];if(td)td.classList.add('stat-worst')}}}
        function parseCSV(t){return t.split('\n').map(l=>{const c=[];let cur='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"')q=!q;else if(ch===','&&!q){c.push(cur.trim());cur=''}else cur+=ch}c.push(cur.trim());return c}).filter(r=>r.some(c=>c!==''))}
        function formatCell(v,h){if(v==null||v==='')return'-';if(typeof v==='number'){if(['KAST','HS%','CL%'].includes(h))return(v*100).toFixed(0)+'%';if(h==='ACS')return Math.round(v);if(h==='ADR')return v.toFixed(1);if(Number.isInteger(v))return v;return v.toFixed(2)}return v}
        function fmtPct(v){if(v==null||v==='')return'-';if(typeof v==='number')return(v*100).toFixed(0)+'%';return v}
        function fmtNum(v){if(v==null||v==='')return'-';return v}

        init();
    </script>
    </div>
