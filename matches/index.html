<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="../icons/PCMT Logo.png">
    <title>PCMT - Matches</title>
</head>
<body>
    <div id="header-bar">
        <div class="header-inner">
        <div class="header-content" id="link-title">
            <a href="../"><img src="../icons/PCMT Logo.png" alt="PCMT Logo" id="pcmt-logo"></a>
            <p>Plat Chat Members Tournament</p>
        </div>
        <nav class="header-content">
            <a class="header-link" href="../">Home</a>
            <a class="header-link active" href="../matches/">Matches</a>
            <a class="header-link" href="../standings/">Standings</a>
            <a class="header-link" href="../teams/">Teams</a>
            <a class="header-link" href="../stats/">Stats</a>
            <div class="header-buffer"></div>
        </nav>
        </div>
    </div>

    <div class="page-container">
    <div class="page-title-bar"><h1 class="page-title">Matches</h1></div>

    <div class="season-selector-bar" id="season-selector"></div>
    <div class="stats-sub-tabs" id="region-selector" style="display:none;"></div>

    <div class="matches-columns" id="matches-area">
        <div class="matches-col">
            <h2 class="matches-col-title">Upcoming</h2>
            <div class="matches-list" id="upcoming"><p class="matches-empty">No upcoming matches</p></div>
        </div>
        <div class="matches-col">
            <h2 class="matches-col-title">Completed</h2>
            <div class="matches-list" id="completed"><div class="matches-loading">Loading matches...</div></div>
        </div>
    </div>

    <script>
        let events = [], currentEvent = null, currentSeason = 2;
        const teamLogos = {}, cache = {}, seasons = {};

        function getEvent(id) { return events.find(e => e.id === id); }
        function dataPath() { const ev = getEvent(currentEvent); return ev ? `../data/events/${ev.path}/` : '../data/events/s2/na/'; }

        async function init() {
            try { events = await (await fetch('../data/events/events.json')).json(); } catch(e) { events = []; }
            events.forEach(e => { if (!seasons[e.season]) seasons[e.season] = []; seasons[e.season].push(e); });

            const fromUrl = new URLSearchParams(window.location.search).get('event');
            if (fromUrl && events.some(e => e.id === fromUrl)) {
                currentEvent = fromUrl;
                currentSeason = getEvent(fromUrl).season;
            } else {
                const ongoing = events.find(e => e.status === 'ongoing');
                if (ongoing) { currentEvent = ongoing.id; currentSeason = ongoing.season; }
                else if (events.length) { currentEvent = events[0].id; currentSeason = events[0].season; }
            }

            renderSelectors();
            await loadTeams();
            loadMatches();
        }

        function renderSelectors() {
            const sNums = Object.keys(seasons).map(Number).sort((a,b) => a - b);
            document.getElementById('season-selector').innerHTML = sNums.map(s =>
                `<button class="season-sel-btn ${s === currentSeason ? 'active' : ''}" onclick="switchSeason(${s})">Season ${s}</button>`
            ).join('');

            const regionBar = document.getElementById('region-selector');
            const sEvents = seasons[currentSeason] || [];
            if (sEvents.length > 1) {
                regionBar.style.display = '';
                regionBar.innerHTML = sEvents.map(e =>
                    `<button class="stats-sub-btn ${e.id === currentEvent ? 'active' : ''}" onclick="switchRegion('${e.id}')">${e.shortName}</button>`
                ).join('');
            } else {
                regionBar.style.display = 'none';
                if (sEvents.length === 1) currentEvent = sEvents[0].id;
            }
        }

        async function switchSeason(s) {
            currentSeason = s;
            const sEvents = seasons[s] || [];
            currentEvent = sEvents[0] ? sEvents[0].id : currentEvent;
            setUrl(); renderSelectors(); await loadTeams(); loadMatches();
        }

        async function switchRegion(id) {
            currentEvent = id; currentSeason = getEvent(id).season;
            setUrl(); renderSelectors(); await loadTeams(); loadMatches();
        }

        function setUrl() { const u = new URL(window.location); u.searchParams.set('event', currentEvent); history.replaceState(null, '', u); }

        async function loadTeams() {
            if (teamLogos[currentEvent]) return;
            try { teamLogos[currentEvent] = await (await fetch(dataPath() + 'teams.json')).json(); }
            catch(e) { teamLogos[currentEvent] = {}; }
        }

        async function loadMatches() {
            const upEl = document.getElementById('upcoming'), compEl = document.getElementById('completed');
            if (cache[currentEvent]) { renderFromCache(cache[currentEvent]); return; }
            upEl.innerHTML = '<p class="matches-empty">No upcoming matches</p>';
            compEl.innerHTML = '<div class="matches-loading">Loading matches...</div>';
            try {
                const res = await fetch(dataPath() + 'matches/matches.json');
                if (!res.ok) { compEl.innerHTML = '<p class="matches-empty">No match data available</p>'; return; }
                cache[currentEvent] = await res.json();
                renderFromCache(cache[currentEvent]);
            } catch(e) { compEl.innerHTML = '<p class="matches-empty">No match data available</p>'; }
        }

        function renderFromCache(matches) {
            renderList('upcoming', matches.filter(m => !m.completed), false);
            renderList('completed', matches.filter(m => m.completed), true);
        }

        function getLogo(abbr) { const t = teamLogos[currentEvent]; return t && t[abbr] ? '../' + t[abbr].logo.replace(/^(\.\.\/)+/, '') : ''; }
        function getName(abbr) { const t = teamLogos[currentEvent]; return t && t[abbr] ? t[abbr].name : abbr; }

        function renderList(id, matches, showScores) {
            const el = document.getElementById(id);
            if (!matches.length) { el.innerHTML = `<p class="matches-empty">No ${showScores ? 'completed' : 'upcoming'} matches</p>`; return; }
            const sorted = [...matches].sort((a,b) => showScores ? new Date(b.date)-new Date(a.date) : new Date(a.date)-new Date(b.date));
            el.innerHTML = sorted.map(m => {
                const w = m.score1 > m.score2 ? 1 : m.score2 > m.score1 ? 2 : 0;
                const l1 = getLogo(m.team1), l2 = getLogo(m.team2);
                let h = `<a class="match-card" href="../matches/match.html?id=${m.id}&event=${currentEvent}">`;
                h += `<div class="match-meta">${m.stage||''}${m.date?' \u00b7 '+m.date:''}</div><div class="match-teams">`;
                h += `<div class="match-team ${showScores&&w===1?'match-winner':''}">`;
                if (l1) h += `<img src="${l1}" class="match-team-logo" onerror="this.style.display='none'">`;
                h += `<span class="match-team-name">${getName(m.team1)}</span><span class="match-team-abbr">${m.team1}</span></div>`;
                if (showScores) h += `<div class="match-score"><span class="${w===1?'score-win':'score-loss'}">${m.score1}</span><span class="score-separator">:</span><span class="${w===2?'score-win':'score-loss'}">${m.score2}</span></div>`;
                else h += '<div class="match-vs">vs</div>';
                h += `<div class="match-team ${showScores&&w===2?'match-winner':''}"><span class="match-team-abbr">${m.team2}</span><span class="match-team-name">${getName(m.team2)}</span>`;
                if (l2) h += `<img src="${l2}" class="match-team-logo" onerror="this.style.display='none'">`;
                h += '</div></div>';
                if (m.maps && m.maps.length) { h += '<div class="match-maps">'; m.maps.forEach(mp => h += `<span class="match-map-tag">${mp.name} <span class="match-map-score">${mp.score1}-${mp.score2}</span></span>`); h += '</div>'; }
                return h + '</a>';
            }).join('');
        }

        init();
    </script>
    </div>
</body>
</html>
